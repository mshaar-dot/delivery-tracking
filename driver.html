<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تتبع السائق</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f5;min-height:100vh}
.top{background:#25D366;color:#fff;padding:20px;text-align:center}
.top h2{font-size:18px;margin-bottom:4px}
.top p{font-size:13px;opacity:.85}
.card{background:#fff;margin:16px;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.tip{background:#FFF8E1;border:1px solid #FFE082;border-radius:12px;margin:16px;padding:16px;font-size:14px;color:#5D4037;line-height:1.7}
.tip b{color:#E65100}
.status{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.dot.on{background:#25D366;animation:pulse 1.5s infinite}
.dot.off{background:#ccc}
.dot.wait{background:#FF9800;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}
.status p{font-size:16px;font-weight:600}
.info{font-size:14px;color:#666;line-height:1.8}
.counter{text-align:center;font-size:13px;color:#999;margin-top:12px}
#map{height:200px;border-radius:12px;margin-top:12px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px;color:#fff}
.btn-stop{background:#e74c3c}
</style>
</head>
<body>
<div class="top">
<h2>تتبع الموقع</h2>
<p>موقعك يُرسل تلقائياً للعميل</p>
</div>

<div class="tip" id="tip">
<b>مهم:</b> لما يطلب المتصفح السماح بالموقع، اختر <b>"السماح"</b>. 
<br>عشان ما يسألك مرة ثانية، اضغط على 🔒 بجانب الرابط فوق واختر <b>"السماح دائماً"</b> للموقع.
</div>

<div class="card">
<div class="status">
<div class="dot wait" id="dot"></div>
<p id="statusText">جاري تحديد موقعك...</p>
</div>
<div class="info" id="info"></div>
<div id="map"></div>
<div class="counter" id="counter"></div>
<button class="btn btn-stop" id="stopBtn" style="display:none" onclick="stopTracking()">إيقاف المشاركة</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var API = 'https://ydclqgywmmuwsdkxzhxu.supabase.co/functions/v1/mini-app?action=update_location';
var params = new URLSearchParams(window.location.search);
var driverId = params.get('did') || '';
var watchId = null, sendCount = 0, myMap = null, myMarker = null;
var lastLat = null, lastLng = null;

// Initialize map immediately
myMap = L.map('map').setView([31.95, 35.93], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(myMap);

// Auto-start tracking immediately when page loads
startTracking();

function startTracking() {
  if (!navigator.geolocation) {
    document.getElementById('statusText').textContent = 'المتصفح لا يدعم تحديد الموقع';
    return;
  }

  // Single watchPosition call - asks permission ONCE
  watchId = navigator.geolocation.watchPosition(
    function(pos) {
      lastLat = pos.coords.latitude;
      lastLng = pos.coords.longitude;

      // First successful location - update UI
      document.getElementById('dot').className = 'dot on';
      document.getElementById('statusText').textContent = 'جاري مشاركة موقعك...';
      document.getElementById('stopBtn').style.display = 'block';
      document.getElementById('tip').style.display = 'none';

      // Update map
      if (myMarker) myMarker.setLatLng([lastLat, lastLng]);
      else {
        myMarker = L.marker([lastLat, lastLng]).addTo(myMap);
        myMap.setView([lastLat, lastLng], 15);
      }
      myMap.panTo([lastLat, lastLng]);
      document.getElementById('info').textContent = 'موقعك: ' + lastLat.toFixed(5) + ', ' + lastLng.toFixed(5);
    },
    function(err) {
      document.getElementById('dot').className = 'dot off';
      if (err.code === 1) {
        document.getElementById('statusText').textContent = 'تم رفض صلاحية الموقع';
        document.getElementById('info').textContent = 'اضغط على 🔒 بجانب الرابط فوق واسمح بالموقع';
      } else {
        document.getElementById('statusText').textContent = 'خطأ: ' + err.message;
      }
    },
    { enableHighAccuracy: true, maximumAge: 15000, timeout: 20000 }
  );

  // Send cached location every 10 seconds - NO new permission requests
  window.sendInterval = setInterval(function() {
    if (lastLat !== null && lastLng !== null) {
      sendLocation(lastLat, lastLng);
    }
  }, 10000);

  // First send after 3 seconds
  setTimeout(function() {
    if (lastLat !== null && lastLng !== null) {
      sendLocation(lastLat, lastLng);
    }
  }, 3000);
}

function stopTracking() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (window.sendInterval) { clearInterval(window.sendInterval); window.sendInterval = null; }
  document.getElementById('dot').className = 'dot off';
  document.getElementById('statusText').textContent = 'تم إيقاف المشاركة';
  document.getElementById('stopBtn').style.display = 'none';
}

async function sendLocation(lat, lng) {
  try {
    await fetch(API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ driver_telegram_id: parseInt(driverId), lat: lat, lng: lng })
    });
    sendCount++;
    document.getElementById('counter').textContent = 'تم إرسال الموقع ' + sendCount + ' مرة';
  } catch(e) {
    document.getElementById('counter').textContent = 'خطأ في الإرسال';
  }
}
</script>
</body>
</html>
